name: Provider Regression Gate

on:
  workflow_dispatch:
    inputs:
      run_build:
        description: "Also run next build after provider regression"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
  schedule:
    - cron: "15 3 * * *"
      timezone: "America/New_York"

concurrency:
  group: provider-regression-${{ github.workflow }}-${{ github.ref_name || github.ref }}
  cancel-in-progress: true

jobs:
  provider-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      NODE_ENV: test
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Optional model overrides
      PROVIDER_REGRESSION_GE_MODEL: ${{ vars.PROVIDER_REGRESSION_GE_MODEL }}
      PROVIDER_REGRESSION_WHIRLPOOL_MODEL: ${{ vars.PROVIDER_REGRESSION_WHIRLPOOL_MODEL }}
      PROVIDER_REGRESSION_FRIGIDAIRE_MODEL: ${{ vars.PROVIDER_REGRESSION_FRIGIDAIRE_MODEL }}
      PROVIDER_REGRESSION_LG_MODEL: ${{ vars.PROVIDER_REGRESSION_LG_MODEL }}
      PROVIDER_REGRESSION_SAMSUNG_MODEL: ${{ vars.PROVIDER_REGRESSION_SAMSUNG_MODEL }}
      PROVIDER_REGRESSION_BOSCH_MODEL: ${{ vars.PROVIDER_REGRESSION_BOSCH_MODEL }}
      PROVIDER_REGRESSION_HISENSE_MODEL: ${{ vars.PROVIDER_REGRESSION_HISENSE_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secret
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Missing GEMINI_API_KEY secret"
            exit 1
          fi

      - name: Announce trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule || 'manual-or-push' }}"

      - name: Run provider regression
        run: npm run provider:regression

      - name: Upload regression JSON
        if: always()
        run: npm run provider:regression:json > provider-regression.json || true

      - name: Save regression artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-regression-${{ github.run_number }}
          path: provider-regression.json
          if-no-files-found: ignore

      - name: Build app
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || inputs.run_build == true }}
        run: npm run build
